<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — Anti-Gravity Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --cyan:#00f9ff;--magenta:#ff00aa;--orange:#e8871e;
  --text:#f0f0f0;--muted:#666;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none}
.mesh::before{content:'';position:absolute;width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(0,249,255,0.08),transparent 70%);border-radius:50%;filter:blur(60px)}
.mesh::after{content:'';position:absolute;width:500px;height:500px;bottom:-150px;right:-100px;background:radial-gradient(circle,rgba(232,135,30,0.08),transparent 70%);border-radius:50%;filter:blur(60px)}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)}
.card{position:relative;z-index:2;background:rgba(10,10,20,0.9);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:min(420px,92vw);backdrop-filter:blur(20px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,249,255,0.4),transparent);border-radius:20px 20px 0 0}
.logo-wrap{text-align:center;margin-bottom:2rem}
.logo-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),var(--magenta));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;color:#000;margin:0 auto 1rem}
.logo-name{font-family:'Orbitron',monospace;font-size:0.9rem;font-weight:700;letter-spacing:0.15em;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-tag{font-size:0.72rem;color:var(--muted);letter-spacing:0.08em;margin-top:0.25rem}
h1{font-family:'Orbitron',monospace;font-size:1rem;letter-spacing:0.1em;text-align:center;margin-bottom:1.75rem;color:rgba(255,255,255,0.5)}
.field{margin-bottom:1.1rem}
label{display:block;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:0.8rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:all 0.2s}
input:focus{border-color:rgba(0,249,255,0.4);background:rgba(255,255,255,0.07);box-shadow:0 0 0 3px rgba(0,249,255,0.06)}
.btn{width:100%;padding:0.85rem;background:linear-gradient(135deg,var(--cyan),var(--magenta));border:none;border-radius:10px;color:#000;font-family:'Orbitron',monospace;font-size:0.78rem;font-weight:700;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;position:relative;overflow:hidden}
.btn:hover:not(:disabled){opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,249,255,0.2)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:0.5rem}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.8s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:0.75rem 1rem;font-size:0.8rem;color:#ff6b6b;margin-top:1rem;display:none;text-align:center}
.footer{text-align:center;margin-top:1.5rem;font-size:0.65rem;color:var(--muted)}
.footer a{color:rgba(0,249,255,0.5);text-decoration:none}
.footer a:hover{color:var(--cyan)}
.status-bar{display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:1.5rem;font-size:0.65rem;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="scanlines"></div>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">AG</div>
    <div class="logo-name">ANTI.GRAVITY</div>
    <div class="logo-tag">MISSION CONTROL</div>
  </div>
  <div class="status-bar"><div class="status-dot"></div><span id="statusText">System online</span></div>
  <h1>COMMANDER ACCESS</h1>
  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@antigravitystudio.in" autocomplete="username" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password" required/>
    </div>
    <button class="btn" id="loginBtn" type="submit">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">⚡ ENTER COMMAND CENTER</span>
      </div>
    </button>
  </form>
  <div class="error" id="errorMsg"></div>
  <div class="footer"><a href="/">← Back to site</a></div>
</div>
<script>
// Auto-redirect if already logged in
fetch('/api/admin/check',{credentials:'include'}).then(r=>r.json()).then(d=>{
  if(d.authenticated) window.location='/admin/dashboard.html';
}).catch(()=>{});

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errorMsg = document.getElementById('errorMsg');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'AUTHENTICATING...';
  errorMsg.style.display = 'none';

  try {
    const res = await fetch('/api/admin/login', {credentials:'include',
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      btnText.textContent = '✅ ACCESS GRANTED';
      document.getElementById('statusText').textContent = 'Authenticated — redirecting...';
      setTimeout(() => window.location = '/admin/dashboard.html', 600);
    } else {
      throw new Error(data.error || 'Invalid credentials');
    }
  } catch(err) {
    errorMsg.textContent = '⛔ ' + (err.message || 'Login failed. Check credentials.');
    errorMsg.style.display = 'block';
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = '⚡ ENTER COMMAND CENTER';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}
</script>
</body>
</html>
