<!DOCTYPE html>
<html>
<head><title>Connecting…</title>
<style>body{background:#0a0a12;color:#ccc;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:1rem;font-size:.9rem}</style>
</head>
<body>
<div style="font-size:1.5rem">✅</div>
<div>Google Photos connected — closing…</div>
<script>
// This page receives the OAuth token in the URL hash from Google.
// The parent window picks it up via polling on popup.location.hash.
// Nothing else needed.
if(window.opener){
  // Token is already in window.location.hash — the opener reads it.
  setTimeout(function(){window.close();},1500);
}
</script>
</body>
</html>
