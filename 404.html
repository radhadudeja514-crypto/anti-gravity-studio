<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>404 — Anti-Gravity Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;color:#f0f0f0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.num{font-family:'Orbitron',monospace;font-size:clamp(6rem,20vw,12rem);font-weight:700;line-height:1;background:linear-gradient(135deg,#00f9ff,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem}
h1{font-family:'Orbitron',monospace;font-size:1.1rem;letter-spacing:0.1em;color:rgba(255,255,255,0.5);margin-bottom:0.75rem}
p{color:#555;font-size:0.9rem;margin-bottom:2rem;max-width:400px}
.links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
a{padding:0.6rem 1.4rem;border-radius:8px;font-size:0.8rem;text-decoration:none;transition:all 0.2s}
.primary{background:linear-gradient(135deg,#00f9ff,#ff00aa);color:#000;font-weight:600}
.secondary{border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)}
.secondary:hover{border-color:rgba(0,249,255,0.3);color:#00f9ff}
</style>
</head>
<body>
<div>
  <div class="num">404</div>
  <h1>PAGE NOT FOUND</h1>
  <p>The page you're looking for has drifted into the cosmos. Let's get you back.</p>
  <div class="links">
    <a href="/" class="primary">← Back to Home</a>
    <a href="/booking.html" class="secondary">Book a Session</a>
    <a href="/admin/login.html" class="secondary">Admin</a>
  </div>
</div>
</body>
</html>
