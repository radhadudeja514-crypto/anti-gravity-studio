<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Google Review — The Radhaa Dudeja Experience</title>
  <meta name="description" content="Share your experience with Radhaa Dudeja — Wedding Host, Sangeet Anchor & Corporate MC. Your review helps others discover us.">
  <meta name="robots" content="noindex">

  <!-- Auto-redirect to Google review page after 2.5s -->
  <meta http-equiv="refresh" content="2; url=https://search.google.com/local/writereview?placeid=ChIJlYrZi9s_CjkR-NmXydNGO-Q">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding: 24px;
    }

    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .brand {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 32px;
    }
    .brand span { color: #f97316; }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    /* Progress bar */
    .progress-wrap {
      background: #1a1a1a;
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 36px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f97316, #ec4899);
      border-radius: 99px;
      animation: fill 2s linear forwards;
    }
    @keyframes fill { to { width: 100%; } }

    .redirect-note {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 40px;
    }

    /* QR code */
    .qr-section {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
      display: inline-block;
    }
    .qr-section img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      display: block;
    }
    .qr-label {
      font-size: 11px;
      color: #333;
      margin-top: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Stars */
    .stars {
      font-size: 2rem;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    /* CTA button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 99px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      background: #4285F4;
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 20px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(66,133,244,0.4);
    }
    .btn svg { width: 22px; height: 22px; flex-shrink: 0; }

    .back-link {
      display: block;
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
      margin-top: 8px;
    }
    .back-link:hover { color: #f97316; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><span>Anti Gravity Studio</span> · The Radhaa Dudeja Experience</div>

    <div class="stars">⭐⭐⭐⭐⭐</div>

    <h1>Loved the experience?<br>Tell the world.</h1>
    <p class="sub">Your review helps couples, corporates &amp; travellers discover us — and takes just 30 seconds.</p>

    <div class="progress-wrap"><div class="progress-bar"></div></div>
    <p class="redirect-note">Redirecting to Google Reviews…</p>

    <div>
      <a class="btn" href="https://search.google.com/local/writereview?placeid=ChIJlYrZi9s_CjkR-NmXydNGO-Q" target="_blank" rel="noopener">
        <!-- Google G icon -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Write a Google Review
      </a>
    </div>

    <div class="qr-section">
      <img src="/assets/img/google-qr.png" alt="Google Business Profile QR Code">
      <div class="qr-label">Scan to review on Google</div>
    </div>

    <a href="/" class="back-link">← Back to Anti Gravity Studio</a>
  </div>

  <script>
    // Redirect after 2s
    setTimeout(() => {
      window.location.href = 'https://search.google.com/local/writereview?placeid=ChIJlYrZi9s_CjkR-NmXydNGO-Q';
    }, 2000);
  </script>
</body>
</html>
